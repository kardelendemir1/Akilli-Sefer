version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Krdlndmr1."
      # varsayılan olarak postgres adlı veritabanı oluşturulur.
      # backend/database_setup.py bu veritabanına bağlanıp "sefer" veritabanını oluşturacak.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
